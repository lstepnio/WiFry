name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        env:
          WIFRY_MOCK_MODE: "true"
        run: |
          cd backend
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short

      - name: Run coverage
        env:
          WIFRY_MOCK_MODE: "true"
        run: |
          cd backend
          source .venv/bin/activate
          pip install coverage
          python -m coverage run -m pytest tests/ -q
          python -m coverage report --fail-under=70

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build
