name: Build WiFry RPi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g., 1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run release validation gates
        run: make ci-release

      - name: Write version file
        run: echo "${{ steps.version.outputs.version }}" > VERSION

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xz-utils parted e2fsprogs dosfstools rsync

      - name: Build RPi image
        run: |
          cd image-build
          sudo bash build-image.sh ${{ steps.version.outputs.version }}

      - name: Smoke-check image artifact
        run: |
          cd image-build/output
          xz -t "wifry-${{ steps.version.outputs.version }}-rpi-arm64.img.xz"
          sha256sum -c "wifry-${{ steps.version.outputs.version }}-rpi-arm64.img.xz.sha256"

      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: wifry-${{ steps.version.outputs.version }}-rpi-arm64
          path: image-build/output/*
          retention-days: 30

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            image-build/output/*
          body: |
            ## WiFry - IP Video Edition ${{ steps.version.outputs.version }}

            ### Flash Instructions
            1. Download `wifry-${{ steps.version.outputs.version }}-rpi-arm64.img.xz`
            2. Flash to SD card using [Raspberry Pi Imager](https://www.raspberrypi.com/software/) (choose "Use custom")
            3. Insert SD card into RPi 4B+ or 5, **connect Ethernet**, boot
            4. Wait ~5 minutes for first-boot setup (installs packages)
            5. Connect to WiFi SSID `WiFry` (password: `wifry1234`)
            6. Open http://192.168.4.1:8080 (served by `wifry-backend`)

            ### Release Validation
            Before this image was published, automation re-ran:
            - backend fast-feedback tests
            - backend release-risk tests
            - frontend lint, tests, type check, and build
            - deploy/release smoke validation for install and recovery paths
            - compressed image integrity checks

            ### Default Credentials
            - **WiFi**: SSID `WiFry`, password `wifry1234`
            - **SSH**: user `pi`, password `wifry`
            - **Fallback IP**: `169.254.42.1` (direct Ethernet connection)

            ### First Boot Requirements
            - Ethernet must be connected (downloads ~200MB of packages)
            - Takes ~5 minutes, then WiFi AP starts automatically
            - Subsequent boots are instant (no internet needed)
